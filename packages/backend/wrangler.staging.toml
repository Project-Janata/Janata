# Chinmaya Janata API - Staging Worker
# Auto-deployed on every push to main.
#
# Binds its OWN D1 (chinmaya-janata-db-staging), isolated from production.
# Provision/seed it with: bash scripts/db/setup-staging-db.sh

name = "chinmaya-janata-api-staging"
main = "src/worker.ts"
compatibility_date = "2026-02-26"

[[d1_databases]]
binding = "DB"
database_name = "chinmaya-janata-db-staging"
database_id = "e8ab870b-2f2b-42f0-94b7-5b631e314676"

[[r2_buckets]]
binding = "AVATARS"
bucket_name = "chinmaya-janata-avatars"

# Non-secret vars only. Secrets come from `wrangler secret put`.
[vars]
RESEND_FROM_EMAIL = "noreply@chinmayajanata.org"
MAIL_APP_BASE_URL = "https://mail.sahasta.com"
VERIFICATION_FROM_EMAIL = "janataverify@sahasta.com"
# Invite gate ON (#342): refuse API signups without a valid invite code.
REQUIRE_INVITE_CODE = "true"

# Secrets set via:
#   bunx wrangler secret put JWT_SECRET         --config wrangler.staging.toml
#   bunx wrangler secret put JWT_REFRESH_SECRET --config wrangler.staging.toml
#   bunx wrangler secret put RESEND_API_KEY     --config wrangler.staging.toml
#   bunx wrangler secret put MAIL_APP_EMAIL     --config wrangler.staging.toml
#   bunx wrangler secret put MAIL_APP_PASSWORD  --config wrangler.staging.toml
