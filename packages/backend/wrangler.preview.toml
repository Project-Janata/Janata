# Chinmaya Janata API — v2 PREVIEW worker
#
# Fully isolated test environment for the v2 sprint. Binds its OWN database so
# test writes never touch production data. (wrangler.staging.toml is likewise
# isolated now, its own chinmaya-janata-db-staging, see issue #406.)
#
# Deploy: bunx wrangler deploy --config packages/backend/wrangler.preview.toml
# URL:    https://chinmaya-janata-api-v2preview.<account>.workers.dev
#
# SETUP — the database_id below is a placeholder. Before first deploy:
#   1. bunx wrangler d1 create chinmaya-janata-db-v2preview
#   2. Paste the returned database_id over PASTE_PREVIEW_DB_ID_HERE
#   3. bash scripts/db/setup-preview-db.sh

name = "chinmaya-janata-api-v2preview"
main = "src/worker.ts"
compatibility_date = "2026-02-26"

[[d1_databases]]
binding = "DB"
database_name = "chinmaya-janata-db-v2preview"
database_id = "3150bf63-caf1-4257-92d5-d759455425e1"

[[r2_buckets]]
binding = "AVATARS"
# Reuses the prod avatars bucket — image blobs keyed by user id, non-destructive,
# test user ids won't collide with real ones. Swap to a preview bucket if you
# want total isolation here too.
bucket_name = "chinmaya-janata-avatars"

# Non-secret vars only. JWT_SECRET / JWT_REFRESH_SECRET come from
# `wrangler secret put` (see below). Never commit signing secrets: anyone who
# can read the repo could otherwise mint valid preview tokens.
[vars]
RESEND_FROM_EMAIL = "noreply@chinmayajanata.org"
MAIL_APP_BASE_URL = "https://mail.sahasta.com"
VERIFICATION_FROM_EMAIL = "janataverify@sahasta.com"
# Invite gate ON (#342): preview exercises the real invite-only flow. The seed
# script registers its role users with a valid code (see seed-preview-roles.sh).
REQUIRE_INVITE_CODE = "true"

# Secrets (set once per worker, NOT in this file):
#   bunx wrangler secret put JWT_SECRET         --config packages/backend/wrangler.preview.toml
#   bunx wrangler secret put JWT_REFRESH_SECRET --config packages/backend/wrangler.preview.toml
#   bunx wrangler secret put RESEND_API_KEY     --config packages/backend/wrangler.preview.toml
#   bunx wrangler secret put MAIL_APP_EMAIL     --config packages/backend/wrangler.preview.toml
#   bunx wrangler secret put MAIL_APP_PASSWORD  --config packages/backend/wrangler.preview.toml
