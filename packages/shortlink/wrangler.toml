# janata.app short-link worker
# Om Sri Chinmaya Sadgurave Namaha. Om Sri Gurubyo Namaha.
#
# Redirects janata.app short links to their canonical chinmayajanata.org equivalents
# and serves the .well-known association files for iOS/Android universal links.
#
# Deploy commands:
#   Production: npm run deploy (from packages/shortlink/)
#   Local dev:  npm run dev

name = "janata-shortlink"
main = "src/index.ts"
compatibility_date = "2026-02-26"

[[routes]]
pattern = "janata.app/*"
zone_name = "janata.app"
