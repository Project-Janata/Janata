name: Deploy

on:
  push:
    branches:
      - main

  workflow_dispatch:
    inputs:
      environment:
        description: 'Deploy to'
        required: true
        type: choice
        options:
          - production

jobs:
  deploy-staging:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    environment: staging

    steps:
      - uses: actions/checkout@v7

      - name: Use Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: TypeScript check (backend)
        run: npx tsc --noEmit
        working-directory: packages/backend

      - name: Run backend tests
        run: npm run test:backend

      - name: Deploy staging backend worker
        run: npx wrangler deploy --config packages/backend/wrangler.staging.toml
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

  deploy-production:
    if: github.event_name == 'workflow_dispatch' && inputs.environment == 'production'
    runs-on: ubuntu-latest
    environment: production

    steps:
      - uses: actions/checkout@v7

      - name: Use Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: TypeScript check (backend)
        run: npx tsc --noEmit
        working-directory: packages/backend

      - name: Run backend tests
        run: npm run test:backend

      - name: Build frontend
        run: npm run build:frontend
        env:
          # Inlined at build time by Expo; same key as local packages/frontend/.env
          EXPO_PUBLIC_POSTHOG_KEY: ${{ secrets.EXPO_PUBLIC_POSTHOG_KEY }}
          EXPO_PUBLIC_POSTHOG_HOST: ${{ secrets.EXPO_PUBLIC_POSTHOG_HOST }}

      - name: Show Pages production branch (diagnostic)
        run: npx wrangler pages project list
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

      - name: Deploy production frontend
        # CF Pages project name is `chinmaya-janata`; its pages.dev host is
        # project-janatha.pages.dev, and chinmayajanata.org is attached there.
        # `--branch __release` targets the project's production branch. In CI,
        # wrangler otherwise INFERS the branch from the checked-out git ref
        # (e.g. v2) and silently publishes a preview alias that never reaches
        # the custom domain — so we pin CF_PAGES_BRANCH to override inference.
        run: npx wrangler pages deploy dist --project-name chinmaya-janata --branch __release
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CF_PAGES_BRANCH: __release

      - name: Deploy production backend worker
        run: npm run deploy:backend
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

      # janata.app short-link / universal-link worker (#515). Requires the
      # janata.app zone to exist in the Cloudflare account (route binds
      # janata.app/*). Idempotent — safe to re-run on every prod deploy.
      - name: Deploy janata.app shortlink worker
        run: npx wrangler deploy --config workers/janata-shortlink/wrangler.toml
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
